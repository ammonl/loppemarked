name: Drift Detection

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "eu-north-1"

jobs:
  detect-drift:
    name: "Detect drift (${{ matrix.scope }})"
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-${{ matrix.scope }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - scope: staging
            working_directory: infra/terraform/environments/staging
            role_var: TF_ROLE_ARN_STAGING
            extra_plan_args: ""
          - scope: prod
            working_directory: infra/terraform/environments/prod
            role_var: TF_ROLE_ARN_PROD
            extra_plan_args: ""
          # Bootstrap is applied manually with operator credentials. The
          # CI role here is read-only, so the plan runs in refresh-only
          # mode and skips state locking to avoid blocking a concurrent
          # operator apply.
          - scope: bootstrap
            working_directory: infra/terraform/bootstrap
            role_var: TF_ROLE_ARN_BOOTSTRAP
            extra_plan_args: "-refresh-only -lock=false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars[matrix.role_var] }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        working-directory: ${{ matrix.working_directory }}
        run: terraform init -input=false

      - name: Terraform plan (drift check)
        id: plan
        working-directory: ${{ matrix.working_directory }}
        shell: bash
        # ${{ matrix.extra_plan_args }} is intentionally unquoted so the
        # space-separated flags (e.g. `-refresh-only -lock=false`)
        # word-split into separate terraform arguments. The matrix
        # values are repo-controlled, not user input.
        run: |
          set +e
          terraform plan -input=false -no-color -detailed-exitcode ${{ matrix.extra_plan_args }} -out=tfplan 2>&1 | tee plan-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "No drift detected"
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "Drift detected"
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
          else
            echo "Terraform plan failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Upload plan artifact
        if: steps.plan.outputs.has_drift == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drift-plan-${{ matrix.scope }}
          path: ${{ matrix.working_directory }}/plan-output.txt
          retention-days: 7

      - name: Create drift issue
        if: steps.plan.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT_PATH: ${{ matrix.working_directory }}/plan-output.txt
          DRIFT_SCOPE: ${{ matrix.scope }}
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync(process.env.PLAN_OUTPUT_PATH, 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.slice(0, 60000) + '\n\n... (truncated)'
              : planOutput;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const scope = process.env.DRIFT_SCOPE;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `IaC drift detected in ${scope}`,
              labels: ['ops', 'drift'],
              body: [
                `## Infrastructure drift detected`,
                '',
                `**Scope:** ${scope}`,
                `**Detected at:** ${new Date().toISOString()}`,
                `**Workflow run:** [View run](${runUrl})`,
                '',
                '### Terraform plan output',
                '',
                '```',
                truncated,
                '```',
                '',
                'Review the plan output and either apply the expected changes or investigate the drift.',
              ].join('\n'),
            });
